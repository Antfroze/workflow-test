name: Long Parallel Workflow

on:
    workflow_dispatch:

jobs:
    parallel-jobs:
        name: Parallel Job ${{ matrix.job }}
        runs-on: ubuntu-latest

        strategy:
            matrix:
                job: [1, 2, 3, 4, 5]

        steps:
            - uses: actions/checkout@v3

            - name: Step 1
              run: |
                  echo "Job${{ matrix.job }} Step1"
                  for i in {1..10}; do
                    echo "Job${{ matrix.job }} Step1 running... $i"
                    sleep 1
                  done

            - name: Step 2
              run: |
                  echo "Job${{ matrix.job }} Step2"
                  for i in {1..10}; do
                    echo "Job${{ matrix.job }} Step2 running... $i"
                    sleep 1
                  done

            - name: Step 3
              run: |
                  echo "Job${{ matrix.job }} Step3"
                  for i in {1..10}; do
                    echo "Job${{ matrix.job }} Step3 running... $i"
                    sleep 1
                  done
