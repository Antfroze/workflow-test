name: Long Workflow with Many Steps

on:
    workflow_dispatch:

jobs:
    multi-step-long-run:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v3

            # Loop to create many steps dynamically
