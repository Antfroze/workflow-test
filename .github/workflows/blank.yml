              run: |
                  echo "Step 1: Starting..."
                  sleep 10

            - name: Step 2
              run: |
                  echo "Step 2: Processing..."
                  sleep 10

            - name: Step 3
              run: |
                  echo "Step 3: Still going..."
                  sleep 10

            - name: Step 4
              run: |
                  echo "Step 4: Halfway check..."
                  sleep 10

            - name: Step 5
              run: |
                  echo "Step 5: Continuing..."
                  sleep 10

            - name: Step 6
              run: |
                  echo "Step 6: Almost there..."
                  sleep 10

            - name: Step 7
              run: |
                  echo "Step 7: Keep going..."
                  sleep 10

            - name: Step 8
              run: |
                  echo "Step 8: Logging live..."
                  sleep 10

            - name: Step 9
              run: |
                  echo "Step 9: Still running..."
                  sleep 10

            - name: Step 10
              run: |
                  echo "Step 10: Midway milestone..."
                  sleep 10

            - name: Step 11
              run: |
                  echo "Step 11: Logging..."
                  sleep 10

            - name: Step 12
              run: |
                  echo "Step 12: Keep streaming..."
                  sleep 10

            - name: Step 13
              run: |
                  echo "Step 13: Almost done..."
                  sleep 10

            - name: Step 14
              run: |
                  echo "Step 14: Final stretch..."
                  sleep 10

            - name: Step 15
              run: |
                  echo "Step 15: Wrapping up..."
                  sleep 10

            - name: Step 16
              run: |
                  echo "Step 16: Logging final messages..."
                  sleep 10

            - name: Step 17
              run: |
                  echo "Step 17: Nearly finished..."
                  sleep 10

            - name: Step 18
              run: |
                  echo "Step 18: Last logs..."
                  sleep 10

            - name: Step 19
              run: |
                  echo "Step 19: Finishing soon..."
                  sleep 10

            - name: Step 20
              run: |
                  echo "Step 20: Workflow complete!"
