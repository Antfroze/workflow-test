name: Long Parallel Workflow

on:
    workflow_dispatch:

jobs:
    job-1:
        name: Parallel Job 1
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Step 1
              run: |
                  echo "Job1 Step1"
                  sleep 10

            - name: Step 2
              run: |
                  echo "Job1 Step2"
                  sleep 10

            - name: Step 3
              run: |
                  echo "Job1 Step3"
                  sleep 10

